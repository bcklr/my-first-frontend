<!DOCTYPE html>
<html>
  <head>
<title>The Untouchable Button</title>
    <style>

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #1a1a1a;
        overflow: hidden;
        margin: 0; 
        font-family: sans-serif;
      }
      #run-away-btn {
        padding: 15px 30px;
        font-size: 20px;
        background-color: #ff4757;
        color: white;
        border: none;
        border-radius: 8px; 
        cursor: pointer;
        position: absolute;
        transition: 0.1s;
      }
    </style>
  </head>
  <body> 
  
    <button id="run-away-btn">Click Me If You Can</button>

    <script>

      const btn = document.getElementById('run-away-btn');

btn.addEventListener('mouseover', function() {

  const x = Math.random() * (window.innerWidth - btn.clientWidth);
            const y = Math.random() * (window.innerHeight - btn.clientHeight);


  btn.style.left = x + 'px';
  btn.style.top = y + 'px';
});


      btn.addEventListener('click', function() {
        alert("Impossible! You actually clicked it!");
      });
  
    </script>
  </body>
</html>
